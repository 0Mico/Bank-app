databaseChangeLog:

  - changeSet:
      id: 003-create-transactions-table
      author: transaction-service
      comment: "Create the transactions table in the banking_transactions schema"
      changes:
        - createTable:
            schemaName: banking_transactions
            tableName: transactions
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    primaryKeyName: transactions_pkey
                    nullable: false
              - column:
                  name: amount
                  type: NUMERIC(19, 2)
                  constraints:
                    nullable: false
              - column:
                  name: category
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: created_at
                  type: TIMESTAMP WITH TIME ZONE
                  constraints:
                    nullable: false
              - column:
                  name: description
                  type: VARCHAR(255)
                  constraints:
                    nullable: true
              - column:
                  name: reference_id
                  type: VARCHAR(255)
                  constraints:
                    nullable: true
              - column:
                  name: type
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: user_id
                  type: BIGINT
                  constraints:
                    nullable: false
              - column:
                  name: account_id
                  type: BIGINT
                  constraints:
                    nullable: true
              - column:
                  name: counterparty_iban
                  type: VARCHAR(255)
                  constraints:
                    nullable: true