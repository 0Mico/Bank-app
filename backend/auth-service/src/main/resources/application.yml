server:
  port: 8081

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://localhost:5432/${DB_NAME}?currentSchema=banking_auth&stringtype=unspecified
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

jwt:
  secret: BankAppSuperSecretKeyForJWTTokenGeneration2026MustBeAtLeast256BitsLong!!
  expiration: 86400000

services:
  account:
    url: http://localhost:8084
