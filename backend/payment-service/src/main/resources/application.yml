server:
  port: 8083

spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/${POSTGRES_DB}?currentSchema=${PAYMENT_SERVICE_SCHEMA}&stringtype=unspecified
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.yml
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/${POSTGRES_DB}
    user: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    default-schema: ${PAYMENT_SERVICE_SCHEMA}

services:
  auth:
    url: http://${AUTH_SERVICE_HOST:localhost}:8081
  transaction:
    url: http://${TRANSACTION_SERVICE_HOST:localhost}:8082
  account:
    url: http://${ACCOUNT_SERVICE_HOST:localhost}:8084
