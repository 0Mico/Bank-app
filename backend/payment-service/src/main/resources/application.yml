server:
  port: 8083

spring:
  application:
    name: payment-service
  datasource:
    url: jdbc:postgresql://${POSTGRES_HOST:localhost}:5432/${POSTGRES_DB}?currentSchema=banking_payments&stringtype=unspecified
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

services:
  auth:
    url: http://${AUTH_SERVICE_HOST:localhost}:8081
  transaction:
    url: http://${TRANSACTION_SERVICE_HOST:localhost}:8082
  account:
    url: http://${ACCOUNT_SERVICE_HOST:localhost}:8084
